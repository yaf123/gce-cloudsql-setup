---
- name: apt パッケージ更新
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: 必要パッケージのインストール
  ansible.builtin.apt:
    name:
      - apache2
      - php
      - libapache2-mod-php
      - php-mysql
      - php-json
      - jq
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: present

- name: gcloud CLI GPGキー配置
  ansible.builtin.shell: |
    curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | \
      gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
  args:
    creates: /usr/share/keyrings/cloud.google.gpg

- name: gcloud CLI リポジトリ追加
  ansible.builtin.copy:
    content: "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main"
    dest: /etc/apt/sources.list.d/google-cloud-sdk.list
    mode: "0644"

- name: gcloud CLI インストール
  ansible.builtin.apt:
    name: google-cloud-cli
    state: present
    update_cache: true
